---
- name: Install Development Stack Add-On (RPM Only)
  hosts: "{{ target_hosts | default('localhost') }}"
  connection: "{{ 'local' if (target_hosts | default('localhost')) == 'localhost' else 'smart' }}"
  vars_files:
    - vars/main.yml
  # Removed global 'become: true'. Privilege escalation is now targeted.

  tasks:
    # =====================================================================
    # SYSTEM CONFIGURATION (RUNS AS ROOT VIA SUDO)
    # =====================================================================
    - name: System Package and Repository Setup
      become: true
      block:
        - name: Ensure required base utilities are installed
          ansible.builtin.dnf:
            name: ['curl', 'git', 'jq']
            state: present

        - name: Install EPEL Release (RHEL-family only)
          ansible.builtin.dnf:
            name: "https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm"
            state: present
          when: ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution'] != 'Fedora'

        - name: Add required RPM repositories
          ansible.builtin.yum_repository:
            name: "{{ item.name }}"
            description: "{{ item.desc }}"
            baseurl: "{{ item.url }}"
            enabled: true
            gpgcheck: true
            gpgkey: "{{ item.key }}"
          loop:
            - name: vscode
              desc: Visual Studio Code
              url: https://packages.microsoft.com/yumrepos/vscode
              key: https://packages.microsoft.com/keys/microsoft.asc
            - name: packages-microsoft-com-prod
              desc: Microsoft Packages Production (PowerShell)
              url: "{{ microsoft_repo_url }}"
              key: https://packages.microsoft.com/keys/microsoft.asc
            - name: hashicorp
              desc: HashiCorp Stable - $basearch
              url: "{{ hashicorp_repo_url }}"
              key: https://rpm.releases.hashicorp.com/gpg
          when: ansible_facts['os_family'] == 'RedHat'

        - name: Install ansible-core (Strictly from official OS repos)
          ansible.builtin.dnf:
            name: ansible-core
            state: present

        - name: Install Development Tooling via DNF
          ansible.builtin.dnf:
            name: "{{ base_tooling_packages + (['powershell'] if install_powershell else []) }}"
            state: present
            update_cache: true

    # =====================================================================
    # USER CONFIGURATION (RUNS NATIVELY AS THE EXECUTING USER)
    # =====================================================================
    - name: Install VS Code extensions
      ansible.builtin.command: "code --install-extension {{ item }}"
      # No become_user or $HOME spoofing needed. Runs cleanly as the developer.
      register: vscode_ext_install
      changed_when: "'was successfully installed' in vscode_ext_install.stdout"
      failed_when:
        - vscode_ext_install.rc != 0
        - "'already installed' not in vscode_ext_install.stderr"
      loop: "{{ vscode_extensions + (['ms-vscode.powershell'] if install_powershell else []) }}"

    - name: Display Post-Installation Guidelines
      ansible.builtin.debug:
        msg: "{{ post_install_guidelines.split('\n') }}"
        